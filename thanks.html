<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:        #080b10;
            --surface:   #0f1520;
            --surface2:  #162030;
            --border:    #1f2e45;
            --border2:   #2a3d58;
            --accent:    #3b82f6;
            --green:     #22c55e;
            --text:      #e2e8f0;
            --text2:     #94a3b8;
            --text3:     #64748b;
            --radius:    8px;
            --radius-lg: 14px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        #thanks {
            min-height: 100vh;
            padding: 32px 20px;
            background: radial-gradient(ellipse at 50% 20%, #0d1a2e 0%, var(--bg) 65%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thanks-card {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .thanks-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(34,197,94,0.12);
            border: 2px solid rgba(34,197,94,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--green);
            margin: 0 auto 24px;
            box-shadow: 0 0 0 8px rgba(34,197,94,0.07);
        }

        .thanks-head {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .thanks-head::before {
            content: 'SUBMISSION CONFIRMED';
            display: block;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--green);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .thanks-sub {
            font-size: 0.93rem;
            color: var(--text2);
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .thanks-details {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 28px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.73rem;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        #thanks-total {
            color: var(--green);
            font-size: 1.15rem;
            font-weight: 700;
        }

        .thanks-note {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .thanks-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            padding: 13px;
            cursor: pointer;
            transition: background 0.18s, transform 0.1s;
        }

        .thanks-btn:hover  { background: #2563eb; }
        .thanks-btn:active { transform: scale(0.985); }
    </style>
</head>
<body>
    <div id="thanks">
        <div class="thanks-card">
            <div class="thanks-icon">✓</div>
            <h2 class="thanks-head">Submission Successful</h2>
            <p class="thanks-sub">Your CBT results have been received</p>
            
            <div class="thanks-details">
                <div class="detail-row">
                    <span class="detail-label">Candidate</span>
                    <span class="detail-value" id="thanks-name">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Score</span>
                    <span class="detail-value" id="thanks-total">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Submitted</span>
                    <span class="detail-value" id="thanks-time">--</span>
                </div>
            </div>

            <p class="thanks-note">A confirmation email has been sent to the examination board. You may now close this window.</p>
            
            <button class="thanks-btn" id="tbtn">Restart Quiz</button>
        </div>
    </div>

    <script>
        // Get data from localStorage with fallbacks
        document.getElementById('thanks-name').innerText = localStorage.getItem('name') || 'Anonymous'
        document.getElementById('thanks-total').innerText = Math.floor(localStorage.getItem('score') || 0) + '/400'
        
        // Set timestamp
        const now = new Date()
        document.getElementById('thanks-time').innerText = 
            now.toLocaleDateString() + ' ' + now.toLocaleTimeString()
        
        // Restart button - clears data and goes home
        document.getElementById('tbtn').addEventListener('click', function (){
            localStorage.clear()
            window.location.href = 'index.html'
        })
    </script>
</body>
</html>
